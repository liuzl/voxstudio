name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS arm64
            runner: macos-15
            slug: macos-arm64
            executable: ./apps/cli/dist/vox
            archive: tar
          - platform: Linux x64
            runner: ubuntu-24.04
            slug: linux-x64
            executable: ./apps/cli/dist/vox
            archive: tar
          - platform: Windows x64
            runner: windows-2025
            slug: windows-x64
            executable: ./apps/cli/dist/vox.exe
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(bun -e 'console.log((await Bun.file("apps/cli/package.json").json()).version)')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$tag_version" = "$package_version" || {
            echo "Tag $GITHUB_REF_NAME does not match CLI version $package_version" >&2
            exit 1
          }
      - name: Install locked dependencies
        run: bun ci
      - name: Typecheck
        run: bun run typecheck
      - name: Test TypeScript
        run: bun run test:ts
      - name: Build native executable
        run: bun run build:cli
      - name: Smoke test executable
        shell: bash
        env:
          VOX: ${{ matrix.executable }}
        run: |
          set -euo pipefail
          "$VOX" --help | grep -q "voxstudio: self-hosted voice I/O"
          "$VOX" say --help | grep -q "usage: vox say"
          "$VOX" voices --help | grep -q "usage: vox voices"
          set +e
          "$VOX" invalid-command >/dev/null 2>&1
          status=$?
          set -e
          test "$status" -eq 2
      - name: Package Unix executable
        if: matrix.archive == 'tar'
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          VOX: ${{ matrix.executable }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="vox-${version}-${SLUG}"
          mkdir -p "dist-release/$package"
          cp "$VOX" README.md config.example.yaml "dist-release/$package/"
          chmod +x "dist-release/$package/vox"
          tar -C dist-release -czf "dist-release/$package.tar.gz" "$package"
          rm -rf "dist-release/$package"
      - name: Package Windows executable
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          SLUG: ${{ matrix.slug }}
          VOX: ${{ matrix.executable }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $package = "vox-$version-$env:SLUG"
          New-Item -ItemType Directory -Path "dist-release/$package" | Out-Null
          Copy-Item $env:VOX, README.md, config.example.yaml -Destination "dist-release/$package"
          Compress-Archive -Path "dist-release/$package" -DestinationPath "dist-release/$package.zip"
          Remove-Item -Recurse "dist-release/$package"
      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.slug }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist-release
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist-release
        run: sha256sum vox-* | sort -k2 > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist-release/*
          --verify-tag
          --generate-notes
          --title "VoxStudio CLI $GITHUB_REF_NAME"

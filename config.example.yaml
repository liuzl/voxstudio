# Copy to voxstudio.yaml (gitignored) or ~/.config/voxstudio/config.yaml.
# ${VAR} is expanded from the environment; an unset var resolves to empty.
# Every key can also be overridden by env: VOXSTUDIO_<ENGINE>_<KEY>, VOXSTUDIO_CHUNK_<KEY>.

# Engines are named instances; multiple per kind are welcome. An instance named
# exactly like a role (tts/asr/llm/asr_longform) is that role's default unless the
# optional `roles:` section says otherwise. Instances may declare `kind` and
# `capabilities` (clone/design/preset/fast/streaming/longform/diarize) for routing —
# e.g. voice registration goes to the first tts with `clone`, and requests can pin an
# instance with `?engine=NAME` at the gateway. See docs/engine-registry.md.
#
#   engines:
#     kokoro:   { kind: tts, base_url: "http://127.0.0.1:18089", model: kokoro, capabilities: [preset, fast] }
#     voxcpm2:  { kind: tts, base_url: "http://gpu-host:8880",   model: voxcpm2, capabilities: [clone, design, streaming],
#                 stream_format: opus }   # compress streamed TTS ~30x for slow WAN links (raw PCM needs 187.5KB/s)
#   roles:
#     tts: kokoro
engines:
  tts:
    base_url: http://127.0.0.1:8880
    model: voxcpm2
    api_key: ${VOXSTUDIO_TTS_API_KEY}
    health_path: /health          # the C++ voxcpm-server serves /healthz instead

  asr:
    base_url: http://127.0.0.1:18086
    model: nemotron-asr           # required for Mandarin; parakeet-tdt has no Chinese
    api_key: ${VOXSTUDIO_ASR_API_KEY}

  # Optional long-form profile: timestamps + anonymous per-recording speakers.
  # Keep `asr` above as the default for interactive and short recordings.
  asr_longform:
    base_url: http://127.0.0.1:18087
    model: moss-transcribe-diarize
    api_key: ${VOXSTUDIO_ASR_LONGFORM_API_KEY}

  llm:
    base_url: http://127.0.0.1:8080
    model: gemma
    api_key: ${VOXSTUDIO_LLM_API_KEY}
    max_tokens: 4096              # keep this generous: a budget small enough to
                                  # truncate the model's reasoning leaves content empty

tts_defaults:
  voice: clone                    # clone | design | <registered voice id>
  cfg_value: 2.0
  timesteps: 10
  response_format: wav

# Terms ASR tends to mishear (brands, product names); transcripts are conservatively
# corrected toward them. Registered voice ids are added automatically at runtime.
# keyterms: ["VoxStudio", "kokoro"]

chunking:
  # The budget is estimated speech duration, not characters -- 85 Chinese characters
  # and 275 English ones both take about 15s to say. See docs/chunking.md.
  max_seconds: 15.0               # timbre drifts within a longer single generation
  first_max_seconds: 8            # enough opening context to stabilize mixed-language delivery
  growth: 2.0                     # then ramp up; playback must outlast the next synthesis
  # Sentence enders across the engine's 30 languages. `.` is checked for decimals,
  # initials and abbreviations before it is trusted. Defaults to `sentenceEnders`
  # in packages/text.
  # sentence_enders: "。！？；!?;.;।॥؟۔។៕။"
  join_pause_ms: 210              # the gap a listener should perceive at a seam
  trim_floor_db: 25.0             # gate this far below the speech level (not the peak)
  edge_pad_ms: 40                 # keep this much sub-gate audio; it holds the consonants

# MCP servers whose tools join the voice conversation (docs/mcp-tools.md).
# Tools with readOnlyHint execute immediately; everything else waits for the user's
# spoken confirmation — unless the server is marked `trust: true`.
# mcp_servers:
#   memo:
#     command: bun                      # stdio server: command + args (+ env)
#     args: [packages/mcp/tools/memo-server.ts]
#   weather:
#     url: https://example.com/mcp      # streamable HTTP server
#     token_env: WEATHER_TOKEN          # bearer token comes from the environment
#     trust: true                       # operator's signature: skip confirmation

# chunking.first_clause_seconds: once the reply's un-terminated first text speaks this
# long, it may end at clause punctuation instead of waiting for the sentence ender —
# the first-audio fast path. Unset here, the conversation loop defaults it to 1.2s;
# long-form reading (vox say) keeps sentence seams unless configured.
# chunking:
#   first_clause_seconds: 1.2

# Pronunciation overrides (docs/conversation-etiquette.md): what the engine speaks may
# diverge from what captions show. Applied longest-term-first at the TTS boundary only.
# pronunciations:
#   VoxStudio: 沃克斯
